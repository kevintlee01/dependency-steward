services:
  postgres:
    image: postgres:16-alpine
    environment:
      # Colima host-port forwarding can break password auth; trust is acceptable for local-only development.
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dependency_steward
    ports:
      # Default to 5433 on the host, but allow local overrides with POSTGRES_HOST_PORT.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: